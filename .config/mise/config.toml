[settings]
# `mise` doesn't support lockfile for global tools. Or at least that's what Gemini said. We work
# around by via the ~/dotfiles project.
lockfile = true
experimental = true

# So we know it's working
status.show_env = true

# npm -> bun, pipx -> uv
npm.package_manager = "bun"
pipx.uvx = true

# Reduce supply chain risk.
install_before = "7d"

[tools]
# Things that better come from the system package manager:
#
# So that `cargo:` tools can use it for compiling.
# sccache =
#
# Could be useful system-wide.
# rg =
# exa =

# Things that should be project-specific.
# bindgen =

# General
fd = "latest"
bat = "latest"
"cargo:mdcat" = "latest"
"cargo:bingrep" = "latest"

# REPLs
babashka = { version = "latest", exe = "bb" }
clickhouse = "26"
duckdb = "1"

# Project management: build tools, task runners
just = "1"

# Language-specific dev tools
pdm = "2"
uv = "latest"
node = "latest"
bun = "latest"
zig = "latest"
"cargo:cargo-outdated" = "latest"
"cargo:cargo-edit" = "latest"
"cargo:cargo-zigbuild" = "latest"
"cargo:cargo-watch" = "latest"

# Unsorted
hyperfine = "latest"
tokei = "latest"
starship = "latest"
"pipx:tmuxp" = "latest"
"pipx:magic-wormhole" = "latest"
stern = "latest"
lima = "latest"
glab = "latest"
"npm:microsandbox" = "latest"

# AI coding
"npm:@anthropic-ai/claude-code" = "latest"
"npm:@zed-industries/claude-agent-acp" = "latest"
"npm:ccstatusline" = "latest"
rtk = "latest"

[env]
RUSTC_WRAPPER = "sccache"
